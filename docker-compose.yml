services:
  mysql:
    image: mysql:8.0
    container_name: mtgcards2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mtgcards2
      MYSQL_USER: mtguser
      MYSQL_PASSWORD: mtgpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../mtg2db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-umtguser", "-pmtgpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: mtgcards-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: mtguser
      DB_PASSWORD: mtgpassword
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
